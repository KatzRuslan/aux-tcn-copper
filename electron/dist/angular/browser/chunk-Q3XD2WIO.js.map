@let mode = store.mode();
@let options = store.vmWorkItems().options;

<div class="flex flex-column gap-4 max-w-60rem">
    <div class="flex gap-6">
        @for (radio of options; track $index) {
            <div class="cursor-pointer" [class.pointer-events-none]="radio.value==mode" (click)="store.putMode(radio.value)" (keypress)="null">
                <div class="flex gap-2 pointer-events-none">
                    <p-radiobutton [inputId]="radio.value" [value]="radio.value" [ngModel]="mode" />
                    <label pLabel [for]="radio.value" class="text-sm">{{ radio.label }}</label>
                </div>
            </div>
        }
    </div>
    <div class="flex gap-4 w-full">
        <p-autocomplete #ac
            [formField]="formGroup.requirement"
            [suggestions]="requirementSuggestions()"
            placeholder="Select requirement" appendTo="body"
            [pt]="acPassThrough()"
            [dropdown]="true" showClear="true" class="w-6"
        />
        @switch (mode) {
            @case (modeType.TASK) {
                <p-autocomplete
                    [formField]="formGroup.task"
                    [suggestions]="taskSuggestions()"
                    placeholder="Select task" appendTo="body"
                    [pt]="acPassThrough()"
                    [dropdown]="true" showClear="true" class="w-6"
                />
            }
            @case (modeType.BUG) {
                <p-autocomplete
                    [formField]="formGroup.bug"
                    [suggestions]="bugSuggestions()"
                    placeholder="Select bug" appendTo="body"
                    [pt]="acPassThrough()"
                    [dropdown]="true" showClear="true" class="w-6"
                />
            }
        }
    </div>
    <div class="">
        <p-iconfield>
            @let copyDisabled = !branchname.value?.length;
            @let svgColor = copyDisabled ? 'var(--p-gray-600)' : '';
            <input pInputText #branchname id="branch-name" class="w-full" [value]="branchName()" />
            <p-inputicon (click)="copyToClipboard(branchname.value)" class="cursor-pointer" [class.pointer-events-none]="copyDisabled">
                <svg data-p-icon="copy" [color]="svgColor" ></svg>
            </p-inputicon>
        </p-iconfield>
    </div>
</div>
